<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon | Seed Scale Global</title>
    <!-- Tailwind CSS for sleek, modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen justify-between antialiased">

    <!-- Header / Logo -->
    <header class="w-full max-w-6xl mx-auto px-6 py-8">
        <div class="flex items-center space-x-2">
        
            <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="https://github.com/SSG-2026/SSG/blob/main/Seed%20Scale%20Global%20Logo_BW.svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-3xl mx-auto px-6 py-12 text-center flex-grow flex flex-col justify-center">
        <!-- Tagline/Badge -->
        <div class="inline-flex items-center mx-auto px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-indigo-700 mb-6 border border-indigo-100">
            Launching Soon
        </div>

        <!-- Heading -->
        <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight text-slate-900 mb-6">
            SSG is reshaping how brands <span class="text-indigo-600">connect and grow</span>.
        </h1>

        <!-- Subheading -->
        <p class="text-lg text-slate-600 max-w-xl mx-auto mb-10 leading-relaxed">
            We're putting the finishing touches on our new digital home. Drop your email below to be the first to know when we launch.
        </p>

        <!-- Email Signup Form (Netlify Form Ready) -->
        <div class="max-w-md w-full mx-auto">
            <!-- 
              Note: The data-netlify="true" and name="launch-signup" attributes 
              tell Netlify to automatically handle form submissions for you.
            -->
            <form name="launch-signup" method="POST" data-netlify="true" class="sm:flex gap-3">
                <input type="hidden" name="form-name" value="launch-signup" />
                <div class="w-full">
                    <label for="email" class="sr-only">Email address</label>
                    <input type="email" name="email" id="email" autocomplete="email" required 
                        class="w-full px-5 py-3 border border-slate-300 rounded-lg shadow-xs placeholder-slate-400 focus:outline-hidden focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-base" 
                        placeholder="Enter your email">
                </div>
                <div class="mt-3 sm:mt-0">
                    <button type="submit" 
                        class="w-full sm:w-auto flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 transition-colors duration-150 cursor-pointer shadow-xs">
                        Notify Me
                    </button>
                </div>
            </form>
            <p class="text-xs text-slate-400 mt-3 text-center sm:text-left sm:px-1">Zero spam - only launch updates.</p>
        </div>
    </main>

    <!-- Footer / Socials -->
    <footer class="w-full max-w-6xl mx-auto px-6 py-8 border-t border-slate-200/60 flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-sm text-slate-500">&copy; 2026 Seed Scale Global. All rights reserved.</p>
        
        <div class="flex space-x-6 text-sm font-medium text-slate-500">
            <a href="https://www.linkedin.com/company/seed-scale-global" class="hover:text-indigo-600 transition-colors">LinkedIn</a>
            
            <a href="mailto:results@seedscaleglobal.com" class="hover:text-indigo-600 transition-colors">Contact</a>
        </div>
    </footer>

</body>
</html>
